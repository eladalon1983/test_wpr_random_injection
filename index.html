<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Random Number Test</title>
</head>

<body>

    <h1 id="random-display">0</h1>

    <script>
        // Math.random() returns a float between 0 and 1
        const randomNumber = Math.random();

        // Target the h1 and update its text
        document.getElementById('random-display').textContent = randomNumber;
    </script>

</body>

</html>
